<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Character</title>
</head>
<body>
  <h1>Edit Character</h1>

  <form method="post" action="/character/{{ index }}/edit">
    <label>Name: <input type="text" name="name" value="{{ name }}" required /></label><br />
    <label>Age: <input type="number" name="age" value="{{ age }}" required /></label><br />
    <label>Health: <input type="number" name="health" value="{{ health }}" required /></label><br />
    <label>Rank: <input type="text" name="rank" value="{{ rank }}" required /></label><br />
    <button type="submit">Save</button>
    <a href="/">Cancel</a>
  </form>
</body>
</html>
